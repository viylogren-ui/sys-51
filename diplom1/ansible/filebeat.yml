---
- name: Install Filebeat from Yandex Mirror
  hosts: hosts
  become: true
  vars_files:
    - "./vars/main.yml"
  tasks:

# Устанавливаем зависимости
    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
        state: present
        update_cache: yes

# Добавление репозитория из зеркала Yandex mirror
    - name: Добавление Yandex mirror в репозитории
      apt_repository:
        repo: "deb [trusted=yes] {{ yandex_mirror_url }}"
        state: present
        filename: elasticsearch

# Установка filebeat из добавленного репозитория
    - name: Установка Filebeat
      apt:
        name: filebeat
        state: present
        update_cache: yes

# Копируем конфиг Filebeat
    - name: Copy Filebeat configuration file
      copy:
        src: ./configs/filebeat/filebeat-config.yml
        dest: /etc/filebeat/filebeat.yml

# Активация модуля nginx
    - name: Включить модуль nginx в Filebeat
      command: filebeat modules enable nginx
      register: filebeat_module_status
      changed_when: "'Enabled nginx' in filebeat_module_status.stdout"
#      notify: Restart filebeat

# Копирую конфиг для модуля nginx на отправку логов
    - name: Copy Nginx configuration file
      copy:
        src: ./configs/filebeat/nginx-config.yml
        dest: /etc/filebeat/modules.d/nginx.yml

# Перезапускаю службы, добавляю в автозапуск
    - name: Enable and restart services
      ansible.builtin.service:
        name: "{{ item }}"
        enabled: true
        state: restarted
      loop:
        - filebeat
        - nginx


